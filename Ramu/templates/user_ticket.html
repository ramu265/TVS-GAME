<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Live Tambola Ticket</title>
    <style>
        :root { 
            --primary: #ff4757; 
            --admin-call: #fff200; /* Yellow for Admin */
            --user-blue: #3498db;  /* Blue for Extra numbers */
            --heart-color: #ff4757; 
        }
        body { font-family: 'Segoe UI', sans-serif; background: #f1f2f6; margin: 0; padding: 10px; text-align: center; }
        
        .header { background: white; padding: 15px; border-radius: 15px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); margin-bottom: 20px; }
        .last-num { font-size: 50px; color: var(--primary); font-weight: bold; transition: transform 0.3s ease-in-out; }
        .pulse { transform: scale(1.1); }

        .ticket-container { display: flex; flex-direction: column; gap: 20px; align-items: center; }
        .ticket { background: white; padding: 10px; border-radius: 10px; box-shadow: 0 5px 15px rgba(0,0,0,0.1); border-left: 8px solid var(--primary); }
        
        table { border-collapse: collapse; margin: 5px auto; }
        td { 
            width: 48px; height: 48px; border: 1px solid #ddd; text-align: center; 
            font-weight: bold; font-size: 19px; cursor: pointer; position: relative; 
            transition: all 0.3s ease; background: white; 
        }
        td.empty { background: #f9f9f9; cursor: default; }

        /* --- ✨ Marking Effects --- */
        
        /* 1. Admin Called: Auto Yellow */
        .is-called { 
            background-color: var(--admin-call) !important; 
            border: 2px solid #f1c40f !important;
            animation: highlight 0.5s ease;
        }

        /* 2. User Manual Click: Heart Symbol */
        .marked-heart::after { 
            content: '❤️'; position: absolute; top: 50%; left: 50%; 
            transform: translate(-50%, -50%); font-size: 26px; 
            pointer-events: none; animation: pop 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        /* 3. Not Called but Clicked: Blue Mark */
        .marked-blue { 
            background-color: var(--user-blue) !important; 
            color: white !important;
            border-radius: 5px;
        }

        @keyframes highlight {
            0% { transform: scale(1.2); background-color: #fffa65; }
            100% { transform: scale(1); background-color: var(--admin-call); }
        }

        @keyframes pop {
            0% { transform: translate(-50%, -50%) scale(0); }
            100% { transform: translate(-50%, -50%) scale(1); }
        }
    </style>
</head>
<body>

    <div class="header">
        <div style="font-size: 14px; color: #666; font-weight: bold;">LIVE CALL</div>
        <div id="current-number" class="last-num">--</div>
    </div>

    <div id="main-ticket-area" class="ticket-container">
        {% for ticket in tickets %}
        <div class="ticket">
            <table>
                {% for row in ticket %}
                <tr>
                    {% for num in row %}
                        {% if num != 0 %}
                            <td onclick="handleTap(this)" data-num="{{ num }}">
                                {{ num }}
                            </td>
                        {% else %}
                            <td class="empty"></td>
                        {% endif %}
                    {% endfor %}
                </tr>
                {% endfor %}
            </table>
        </div>
        {% endfor %}
    </div>

    <script>
        let tapCount = 0;
        let tapTimer;
        let adminCalledNumbers = [];

        // --- 👆 Marking Logic (Double Click) ---
        function handleTap(element) {
            const num = parseInt(element.getAttribute('data-num'));
            tapCount++;

            if (tapCount === 1) {
                tapTimer = setTimeout(() => {
                    // Single Click Logic
                    applyMarking(element, num);
                    tapCount = 0;
                }, 300);
            } else if (tapCount === 2) {
                clearTimeout(tapTimer);
                // Double Click: Toggle Heart regardless of other marks
                element.classList.toggle('marked-heart');
                tapCount = 0;
            }
        }

        function applyMarking(element, num) {
            if (adminCalledNumbers.includes(num)) {
                // Admin already called: It's yellow, user can toggle heart on top
                element.classList.toggle('marked-heart');
            } else {
                // Admin hasn't called: Mark Blue
                element.classList.toggle('marked-blue');
            }
        }

        // --- 🔄 Auto Update Logic ---
        function updateGame() {
            fetch('/get_updates')
            .then(res => res.json())
            .then(data => {
                if (data.called && data.called.length > 0) {
                    const newCalled = data.called;
                    const lastNum = newCalled[newCalled.length - 1];
                    
                    // Update Header if new number arrives
                    const display = document.getElementById('current-number');
                    if (display.innerText != lastNum) {
                        display.innerText = lastNum;
                        display.classList.add('pulse');
                        setTimeout(() => display.classList.remove('pulse'), 500);
                    }

                    adminCalledNumbers = newCalled;

                    // Auto-mark Yellow for all admin called numbers
                    document.querySelectorAll('td[data-num]').forEach(td => {
                        const n = parseInt(td.getAttribute('data-num'));
                        if (adminCalledNumbers.includes(n)) {
                            td.classList.add('is-called');
                            td.classList.remove('marked-blue'); // Remove blue if it's now called
                        }
                    });
                }
            });
        }

        // 3 సెకన్లకు ఒకసారి సర్వర్ నుండి అప్‌డేట్స్ తెస్తుంది
        setInterval(updateGame, 3000);
        updateGame();
    </script>
</body>
</html>
