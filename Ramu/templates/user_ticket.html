<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Live Tambola Ticket</title>

<style>
body { font-family: 'Segoe UI', Arial, sans-serif; text-align: center; background: #f0f2f5; margin: 0; padding-top: 160px; }
.header { position: fixed; top: 0; width: 100%; background: white; padding: 20px 0; box-shadow: 0 4px 15px rgba(0,0,0,0.1); z-index: 1000; }
.current-label { font-size: 14px; color: #040404; font-weight: bold; text-transform: uppercase; }
.call-num { font-size: 55px; font-weight: 900; color: #ff4757; margin: 5px 0; line-height: 1; }
.btn-audio { padding: 10px 25px; background: #6c5ce7; color: white; border: none; border-radius: 25px; font-weight: bold; cursor: pointer; }

.ticket-container { display: flex; flex-direction: column; align-items: center; padding: 15px; gap: 25px; }
.ticket { background: white; padding: 15px; border-radius: 15px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); width: 100%; max-width: 480px; border-top: 8px solid #ff4757; }
.ticket-id { text-align: left; font-size: 14px; color: #999; font-weight: bold; margin-bottom: 10px; }

table { width: 100%; border-collapse: separate; border-spacing: 5px; table-layout: fixed; }
td { border: 1px solid #e0e0e0; height: 55px; text-align: center; font-weight: 800; font-size: 22px; position: relative; cursor: pointer; border-radius: 8px; }
.empty { background: #f8f9fa; border-color: #eee; }

.auto-match { background-color: #ffeb3b; color: #000; border: 2px solid #fbc02d; }
.marked-heart { background-color: #ff4757; color: white; }
.marked-heart::after { content: '❤️'; position: absolute; font-size: 16px; top: -10px; right: -8px; }
.marked-normal { background-color: #3498db; color: white; }
</style>
</head>
<body>

<div class="header">
    <div class="current-label">Last Number</div>
    <div class="call-num" id="last-num">--</div>
</div>

<div class="ticket-container" id="ticketContainer"></div>

<script>

function shuffle(array) {
    for (let i = array.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [array[i], array[j]] = [array[j], array[i]];
    }
    return array;
}

function generateTickets() {

    const container = document.getElementById("ticketContainer");
    container.innerHTML = "";

    // Step 1: create 1–90 unique numbers
    let allNumbers = shuffle(Array.from({length:90}, (_,i)=>i+1));

    // Step 2: split into 6 tickets (15 each)
    let ticketsNumbers = [];
    for(let i=0;i<6;i++){
        ticketsNumbers.push(allNumbers.slice(i*15,(i+1)*15));
    }

    // Step 3: build ticket structure
    let tickets = [];

    for(let t=0;t<6;t++){

        let ticket = Array.from({length:3},()=>Array(9).fill(""));

        let nums = ticketsNumbers[t].sort((a,b)=>a-b);

        nums.forEach(num=>{

            let col = Math.floor(num/10);
            if(num===90) col=8;

            // find row with <5 numbers
            let possibleRows = [];
            for(let r=0;r<3;r++){
                let count = ticket[r].filter(x=>x!=="").length;
                if(count<5 && ticket[r][col]===""){
                    possibleRows.push(r);
                }
            }

            if(possibleRows.length>0){
                let row = possibleRows[Math.floor(Math.random()*possibleRows.length)];
                ticket[row][col]=num;
            }
        });

        tickets.push(ticket);
    }

    // Step 4: render tickets
    tickets.forEach((ticket,index)=>{

        let ticketDiv=document.createElement("div");
        ticketDiv.className="ticket";

        let title=document.createElement("div");
        title.className="ticket-id";
        title.innerText="TICKET #"+(index+1);
        ticketDiv.appendChild(title);

        let table=document.createElement("table");

        ticket.forEach(row=>{
            let tr=document.createElement("tr");

            row.forEach(val=>{
                let td=document.createElement("td");

                if(val===""){
                    td.className="empty";
                } else {
                    td.className="cell";
                    td.setAttribute("data-num",val);
                    td.innerText=val;
                    td.onclick=()=>handleInteraction(td);
                }

                tr.appendChild(td);
            });

            table.appendChild(tr);
        });

        ticketDiv.appendChild(table);
        container.appendChild(ticketDiv);
    });

    console.log("✔ No Repeat Numbers");
}

generateTickets();

</script>
</body>
</html>
