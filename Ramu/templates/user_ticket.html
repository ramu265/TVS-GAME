<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Premium 6-Ticket Tambola</title>
    <style>
        :root { 
            --primary: #ff4757; 
            --admin-call: #fff200; 
            --user-blue: #3498db;  
            --glass: rgba(255, 255, 255, 0.1);
        }
        body { font-family: 'Segoe UI', sans-serif; background: #1e272e; margin: 0; padding: 10px; color: white; }
        
        .header { background: rgba(255,255,255,0.05); backdrop-filter: blur(10px); padding: 15px; border-radius: 20px; border: 1px solid var(--glass); margin-bottom: 20px; position: sticky; top: 10px; z-index: 100; }
        .last-num { font-size: 55px; color: var(--admin-call); font-weight: bold; text-shadow: 0 0 15px rgba(255, 242, 0, 0.5); }
        
        .ticket-container { display: flex; flex-direction: column; gap: 25px; align-items: center; padding-bottom: 50px; }
        .ticket { background: white; padding: 8px; border-radius: 12px; box-shadow: 0 10px 25px rgba(0,0,0,0.4); border-top: 6px solid var(--primary); width: fit-content; }
        .ticket-label { color: #2f3542; font-size: 12px; font-weight: bold; margin-bottom: 5px; text-align: left; opacity: 0.6; }

        table { border-collapse: separate; border-spacing: 3px; }
        td { 
            width: 42px; height: 42px; border-radius: 6px; text-align: center; 
            font-weight: bold; font-size: 18px; cursor: pointer; position: relative; 
            transition: all 0.2s; background: #f1f2f6; color: #2f3542;
        }
        td.empty { background: #dfe4ea; cursor: default; }

        /* --- ✨ Marking Styles --- */
        .is-called { background: var(--admin-call) !important; box-shadow: inset 0 0 8px rgba(0,0,0,0.1); }
        .marked-blue { background: var(--user-blue) !important; color: white !important; }
        
        .marked-heart::after { 
            content: '❤️'; position: absolute; top: 50%; left: 50%; 
            transform: translate(-50%, -50%); font-size: 28px; 
            pointer-events: none; animation: heartBeat 0.3s ease-out;
        }

        @keyframes heartBeat {
            0% { transform: translate(-50%, -50%) scale(0); }
            100% { transform: translate(-50%, -50%) scale(1); }
        }

        .pulse { animation: pulseAnim 0.5s ease; }
        @keyframes pulseAnim {
            0% { transform: scale(1); }
            50% { transform: scale(1.1); }
            100% { transform: scale(1); }
        }
    </style>
</head>
<body>

    <div class="header">
        <div style="font-size: 12px; color: #aaa; letter-spacing: 1px;">CURRENT NUMBER</div>
        <div id="current-number" class="last-num">--</div>
    </div>

    <div id="main-ticket-area" class="ticket-container">
        </div>

    <script>
        let tapCount = 0;
        let tapTimer;
        let adminCalledNumbers = [];

        // --- 🎲 1-90 Numbers distribute Logic ---
        function generateAllTickets() {
            let allNumbers = Array.from({length: 90}, (_, i) => i + 1);
            // Shuffle numbers randomly
            allNumbers.sort(() => Math.random() - 0.5);

            const container = document.getElementById('main-ticket-area');
            container.innerHTML = ''; // Clear old tickets

            // 6 టిక్కెట్లు క్రియేట్ చేయడం
            for (let t = 0; t < 6; t++) {
                let ticketNumbers = allNumbers.slice(t * 15, (t + 1) * 15);
                ticketNumbers.sort((a, b) => a - b); // Sorting for better look

                let ticketDiv = document.createElement('div');
                ticketDiv.className = 'ticket';
                ticketDiv.innerHTML = `<div class="ticket-label">TICKET #${t+1}</div>`;

                let table = document.createElement('table');
                
                // 3 రోలు, ప్రతి రో లో 5 నంబర్లు (ఖాళీలు లేకుండా సింపుల్ గా)
                for (let r = 0; r < 3; r++) {
                    let tr = document.createElement('tr');
                    let rowNums = ticketNumbers.slice(r * 5, (r + 1) * 5);
                    
                    rowNums.forEach(num => {
                        let td = document.createElement('td');
                        td.innerText = num;
                        td.setAttribute('data-num', num);
                        td.onclick = function() { handleTap(this); };
                        tr.appendChild(td);
                    });
                    table.appendChild(tr);
                }
                ticketDiv.appendChild(table);
                container.appendChild(ticketDiv);
            }
        }

        // --- 👆 Interaction Logic ---
        function handleTap(element) {
            const num = parseInt(element.getAttribute('data-num'));
            tapCount++;

            if (tapCount === 1) {
                tapTimer = setTimeout(() => {
                    if (adminCalledNumbers.includes(num)) {
                        element.classList.toggle('marked-heart');
                    } else {
                        element.classList.toggle('marked-blue');
                    }
                    tapCount = 0;
                }, 250);
            } else if (tapCount === 2) {
                clearTimeout(tapTimer);
                element.classList.toggle('marked-heart');
                tapCount = 0;
            }
        }

        // --- 🔄 Sync with Admin ---
        function updateGame() {
            fetch('/get_updates')
            .then(res => res.json())
            .then(data => {
                if (data.called && data.called.length > 0) {
                    const newCalled = data.called;
                    const lastNum = newCalled[newCalled.length - 1];
                    const display = document.getElementById('current-number');

                    if (display.innerText != lastNum) {
                        display.innerText = lastNum;
                        display.classList.add('pulse');
                        setTimeout(() => display.classList.remove('pulse'), 500);
                    }

                    adminCalledNumbers = newCalled;

                    // అడ్మిన్ కాల్ చేసిన నంబర్లకు ఎల్లో మార్క్ వేయడం
                    document.querySelectorAll('td[data-num]').forEach(td => {
                        const n = parseInt(td.getAttribute('data-num'));
                        if (adminCalledNumbers.includes(n)) {
                            td.classList.add('is-called');
                            td.classList.remove('marked-blue'); 
                        }
                    });
                }
            });
        }

        // Start
        generateAllTickets();
        setInterval(updateGame, 3000);
        updateGame();
    </script>
</body>
</html>
