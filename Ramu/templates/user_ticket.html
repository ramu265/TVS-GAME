<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Premium Live Housie - 6 Tickets</title>
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <style>
        :root { 
            --primary: #ff4757; 
            --admin-call: #fff200; 
            --user-blue: #3498db; 
        }
        body { font-family: 'Segoe UI', Arial, sans-serif; text-align: center; background: #1e272e; margin: 0; padding: 0; color: white; }
        
        .sticky-header { position: fixed; top: 0; width: 100%; background: #2d3436; z-index: 1000; border-bottom: 4px solid var(--primary); }
        .header-content { display: flex; justify-content: space-between; align-items: center; padding: 10px 15px; max-width: 1000px; margin: 0 auto; }
        .h-dot { display: inline-block; background: var(--primary); color: white; width: 30px; height: 30px; border-radius: 50%; line-height: 30px; margin: 2px; font-weight: bold; font-size: 13px; }

        .ticket-container { margin-top: 140px; padding: 15px; display: flex; flex-direction: column; gap: 20px; align-items: center; }
        .ticket-wrapper { background: white; padding: 10px; border-radius: 12px; max-width: 500px; width: 95%; box-shadow: 0 10px 30px rgba(0,0,0,0.4); border-top: 6px solid var(--primary); }

        table { width: 100%; border-collapse: separate; border-spacing: 2px; table-layout: fixed; }
        td { 
            height: 45px; border-radius: 4px; font-weight: bold; font-size: 18px; 
            position: relative; cursor: pointer; user-select: none;
            background: #f1f2f6; color: #2d3436; 
        }

        .is-called { background-color: var(--admin-call) !important; }
        .marked-blue { background-color: var(--user-blue) !important; color: white !important; }
        
        .marked-heart::after {
            content: '❤️'; position: absolute; top: 50%; left: 50%;
            transform: translate(-50%, -50%); font-size: 24px; opacity: 0.8;
        }

        .empty { background: #dfe4ea !important; }

        @media (max-width: 450px) {
            .ticket-container { margin-top: 180px; }
            td { height: 38px; font-size: 16px; }
        }
    </style>
</head>
<body>

    <div class="sticky-header">
        <div class="header-content">
            <div id="live-h"></div>
            <button id="voice-toggle" class="h-dot" style="width:auto; border-radius:20px; padding:0 15px;" onclick="toggleUserAudio()">🎙️ Join</button>
            <audio id="remote-audio" autoplay></audio>
        </div>
    </div>

    <div id="main-ticket-area" class="ticket-container"></div>

    <script>
        let adminCalledNumbers = [];
        let tapCount = 0;
        let tapTimer;

        // --- 🎲 హౌసీ స్టాండర్డ్ టిక్కెట్ జనరేటర్ ---
        function generateHousieTickets() {
            let allNumbers = Array.from({length: 90}, (_, i) => i + 1);
            allNumbers.sort(() => Math.random() - 0.5);

            const container = document.getElementById('main-ticket-area');
            container.innerHTML = '';

            for (let t = 0; t < 6; t++) {
                let ticketNums = allNumbers.slice(t * 15, (t + 1) * 15);
                let grid = Array(3).fill().map(() => Array(9).fill(0));
                
                // నంబర్లను సరైన కాలమ్స్‌లో ఉంచడం
                ticketNums.forEach(n => {
                    let col = n === 90 ? 8 : Math.floor(n / 10);
                    let row = Math.floor(Math.random() * 3);
                    while(grid[row][col] !== 0) row = (row + 1) % 3;
                    grid[row][col] = n;
                });

                let wrapper = document.createElement('div');
                wrapper.className = 'ticket-wrapper';
                wrapper.innerHTML = `<h3 style="color:#2d3436; margin:5px; font-size:14px;">Ticket #${t+1}</h3>`;

                let table = document.createElement('table');
                grid.forEach(row => {
                    let tr = document.createElement('tr');
                    row.forEach(val => {
                        let td = document.createElement('td');
                        if (val !== 0) {
                            td.innerText = val;
                            td.setAttribute('data-num', val);
                            td.onclick = function() { handleTap(this); };
                        } else {
                            td.className = 'empty';
                        }
                        tr.appendChild(td);
                    });
                    table.appendChild(tr);
                });
                wrapper.appendChild(table);
                container.appendChild(wrapper);
            }
        }

        function handleTap(element) {
            const num = parseInt(element.getAttribute('data-num'));
            tapCount++;
            if (tapCount === 1) {
                tapTimer = setTimeout(() => {
                    if (adminCalledNumbers.includes(num)) {
                        element.classList.toggle('marked-heart');
                    } else {
                        element.classList.toggle('marked-blue');
                    }
                    tapCount = 0;
                }, 250);
            } else {
                clearTimeout(tapTimer);
                element.classList.toggle('marked-heart');
                tapCount = 0;
            }
        }

        function fetchUpdates() {
            fetch('/get_updates').then(res => res.json()).then(data => {
                if(data.called) {
                    adminCalledNumbers = data.called;
                    let html = "";
                    data.called.slice().reverse().slice(0, 8).forEach(n => {
                        html += `<span class="h-dot">${n}</span>`;
                    });
                    document.getElementById('live-h').innerHTML = html;

                    document.querySelectorAll('td[data-num]').forEach(td => {
                        if (adminCalledNumbers.includes(parseInt(td.getAttribute('data-num')))) {
                            td.classList.add('is-called');
                        }
                    });
                }
            });
        }

        generateHousieTickets();
        setInterval(fetchUpdates, 3000);
    </script>
</body>
</html>
