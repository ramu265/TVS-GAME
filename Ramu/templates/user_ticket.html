<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TVS Housie - Live Game</title>
    <style>
        :root {
            --admin-yellow: #fff200;
            --user-pink: #ff4757;
            --wrong-blue: #3498db;
            --bg-dark: #1e272e;
        }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg-dark); color: white; text-align: center; margin: 0; padding: 10px; }
        
        .header { background: #2d3436; padding: 15px; position: sticky; top: 0; z-index: 100; border-bottom: 3px solid var(--user-pink); }
        
        .ticket-container { display: flex; flex-direction: column; gap: 25px; align-items: center; margin-top: 20px; }
        
        .ticket { background: white; border-radius: 8px; padding: 8px; width: 340px; box-shadow: 0 10px 20px rgba(0,0,0,0.4); }
        
        table { width: 100%; border-collapse: separate; border-spacing: 4px; }
        
        td { 
            width: 35px; height: 40px; border-radius: 5px; border: 1px solid #ccc; 
            text-align: center; font-weight: bold; font-size: 19px; color: #2d3436;
            cursor: pointer; position: relative; transition: 0.3s; background: #f1f2f6;
        }

        .empty { background-color: #dfe4ea; border: none; cursor: default; }

        /* 🟡 Admin Announced (Automatic) */
        .is-called-by-admin { background-color: var(--admin-yellow) !important; animation: highlight 1s infinite alternate; }

        /* 💗 User Clicked Correct (Pink + Heart) */
        .user-correct { background-color: var(--user-pink) !important; color: white !important; }
        .user-correct::before {
            content: '❤️'; position: absolute; top: -2px; right: -2px; font-size: 12px;
        }

        /* 🔵 User Clicked Wrong (Blue/Red) */
        .user-wrong { background-color: var(--wrong-blue) !important; color: white !important; border: 2px solid #c0392b; }

        @keyframes highlight { from { transform: scale(1); } to { transform: scale(1.05); } }

        .recent-numbers { display: flex; justify-content: center; gap: 8px; margin-top: 10px; }
        .num-dot { background: var(--user-pink); color: white; width: 30px; height: 30px; border-radius: 50%; line-height: 30px; font-weight: bold; }
    </style>
</head>
<body>

    <div class="header">
        <h3>TVS Premium Housie</h3>
        <div id="live-status">Recent Numbers:</div>
        <div class="recent-numbers" id="numbers-strip"></div>
    </div>

    <div class="ticket-container">
        {% for ticket in tickets %}
        <div class="ticket">
            <div style="color: #666; font-size: 11px; text-align: left; margin-bottom: 5px;">TICKET #{{ loop.index }}</div>
            <table>
                {% for row in ticket %}
                <tr>
                    {% for cell in row %}
                    <td class="{% if cell == 0 %}empty{% endif %}" 
                        data-number="{{ cell }}" 
                        ondblclick="handleUserMark(this)">
                        {% if cell != 0 %}{{ cell }}{% endif %}
                    </td>
                    {% endfor %}
                </tr>
                {% endfor %}
            </table>
        </div>
        {% endfor %}
    </div>

    <script>
        let adminCalledNumbers = [];

        // అడ్మిన్ చెప్పిన నంబర్ల అప్‌డేట్ కోసం
        function fetchGameUpdates() {
            fetch('/get_updates').then(res => res.json()).then(data => {
                adminCalledNumbers = data.called;
                
                // టాప్ స్ట్రిప్ అప్‌డేట్
                let stripHtml = "";
                adminCalledNumbers.slice(-5).reverse().forEach(n => {
                    stripHtml += `<span class="num-dot">${n}</span>`;
                });
                document.getElementById('numbers-strip').innerHTML = stripHtml;

                // టిక్కెట్ గడులను ఆటోమేటిక్ గా Yellow చేయడం
                document.querySelectorAll('td').forEach(td => {
                    let num = parseInt(td.getAttribute('data-number'));
                    if (num > 0 && adminCalledNumbers.includes(num)) {
                        // కేవలం యూజర్ మార్క్ చేయని వాటినే Yellow చేస్తుంది
                        if (!td.classList.contains('user-correct')) {
                            td.classList.add('is-called-by-admin');
                        }
                    }
                });
            });
        }

        // యూజర్ డబుల్ క్లిక్ చేసినప్పుడు
        function handleUserMark(el) {
            let num = parseInt(el.getAttribute('data-number'));
            if (!num || num === 0) return;

            if (adminCalledNumbers.includes(num)) {
                // అడ్మిన్ చెప్పిన నంబర్ అయితే -> Pink + Heart
                el.classList.remove('is-called-by-admin');
                el.classList.toggle('user-correct');
            } else {
                // అడ్మిన్ చెప్పని నంబర్ అయితే -> Blue
                el.classList.toggle('user-wrong');
            }
        }

        // ప్రతి 3 సెకన్లకు ఒకసారి చెక్ చేస్తుంది
        setInterval(fetchGameUpdates, 3000);
    </script>
</body>
</html>
